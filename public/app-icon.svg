<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern iOS-style gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="letterGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e7ff;stop-opacity:0.9" />
    </linearGradient>
    <!-- Subtle top highlight -->
    <linearGradient id="topLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background with gradient (iOS style) -->
  <rect width="512" height="512" rx="115" fill="url(#bgGradient)"/>
  
  <!-- Subtle highlight at top for depth -->
  <rect width="512" height="200" rx="115" fill="url(#topLight)"/>
  
  <!-- Large "C" Letter - Bold and modern -->
  <text 
    x="256" 
    y="360" 
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" 
    font-size="360" 
    font-weight="900" 
    fill="url(#letterGradient)" 
    text-anchor="middle"
    style="text-shadow: 0 8px 24px rgba(0,0,0,0.3);"
  >C</text>
  
  <!-- Subtle bottom shadow for depth -->
  <ellipse cx="256" cy="490" rx="200" ry="15" fill="#000000" opacity="0.15"/>
</svg>
