<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Push Notification Direct Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
        }
        button:hover {
            background: #2563eb;
        }
        .log {
            background: #262626;
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .success { color: #22c55e; }
        .error { color: #ef4444; }
        .info { color: #3b82f6; }
    </style>
</head>
<body>
    <h1>🔔 Push Notification Direct Test</h1>
    <p>This page tests push notifications directly without the backend API.</p>

    <div>
        <button onclick="checkPermission()">1. Check Permission</button>
        <button onclick="registerSW()">2. Register Service Worker</button>
        <button onclick="subscribe()">3. Subscribe to Push</button>
        <button onclick="testLocal()">4. Test Local Notification</button>
        <button onclick="clearLog()">Clear Log</button>
    </div>

    <div class="log" id="log"></div>

    <script>
        const VAPID_PUBLIC_KEY = 'BHpd9-yFkjQy2i-uxeFvATb2dmf_ZOJp0FrrgeVGHPbPx528FprwkqtC6dXLfHKREdGS2Ad9uj5U28rNDoLfmJo';
        let registration = null;

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colors = { success: 'success', error: 'error', info: 'info' };
            logDiv.innerHTML += `<div class="${colors[type]}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        async function checkPermission() {
            if (!('Notification' in window)) {
                log('❌ This browser does not support notifications', 'error');
                return;
            }

            const permission = Notification.permission;
            log(`📢 Notification permission: ${permission}`, permission === 'granted' ? 'success' : 'info');

            if (permission === 'default') {
                log('💡 Click "3. Subscribe to Push" to request permission', 'info');
            } else if (permission === 'denied') {
                log('❌ Notifications are blocked. Enable them in browser settings.', 'error');
            } else {
                log('✅ Notifications are allowed!', 'success');
            }
        }

        async function registerSW() {
            try {
                if (!('serviceWorker' in navigator)) {
                    log('❌ Service Workers not supported', 'error');
                    return;
                }

                log('📝 Registering service worker...', 'info');
                registration = await navigator.serviceWorker.register('/sw.js');
                log('✅ Service Worker registered successfully!', 'success');
                log(`📊 Scope: ${registration.scope}`, 'info');
            } catch (error) {
                log(`❌ Service Worker registration failed: ${error.message}`, 'error');
            }
        }

        function urlBase64ToUint8Array(base64String) {
            const padding = '='.repeat((4 - base64String.length % 4) % 4);
            const base64 = (base64String + padding)
                .replace(/-/g, '+')
                .replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        async function subscribe() {
            try {
                if (!registration) {
                    log('❌ Please register service worker first', 'error');
                    return;
                }

                log('🔔 Requesting notification permission...', 'info');
                const permission = await Notification.requestPermission();

                if (permission !== 'granted') {
                    log(`❌ Permission ${permission}`, 'error');
                    return;
                }

                log('✅ Permission granted!', 'success');
                log('📝 Creating push subscription...', 'info');

                const subscription = await registration.pushManager.subscribe({
                    userVisibleOnly: true,
                    applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
                });

                log('✅ Push subscription created!', 'success');
                log('📊 Subscription details:', 'info');
                log(JSON.stringify(subscription.toJSON(), null, 2), 'info');

            } catch (error) {
                log(`❌ Subscription failed: ${error.message}`, 'error');
            }
        }

        async function testLocal() {
            try {
                if (!registration) {
                    log('❌ Please register service worker first', 'error');
                    return;
                }

                if (Notification.permission !== 'granted') {
                    log('❌ Please grant notification permission first', 'error');
                    return;
                }

                log('📤 Sending local notification...', 'info');

                await registration.showNotification('Test Notification', {
                    body: 'This is a local test notification from ClanPlug!',
                    icon: '/favicon.ico',
                    badge: '/favicon.ico',
                    tag: 'test-local',
                    vibrate: [200, 100, 200],
                    requireInteraction: false,
                });

                log('✅ Local notification sent! Check your screen!', 'success');

            } catch (error) {
                log(`❌ Local notification failed: ${error.message}`, 'error');
            }
        }

        // Auto check on load
        window.onload = () => {
            log('🚀 Push Notification Test Page Loaded', 'info');
            log('💡 Follow the steps 1-4 to test notifications', 'info');
            checkPermission();
        };
    </script>
</body>
</html>
